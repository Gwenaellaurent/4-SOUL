<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Existential Achetypes</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      /* Force le plein écran sur le navigateur */
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden; /* Empêche le scroll */
        background-color: #232323; /* Couleur de fond par défaut */
      }

      .webgl-content {
        width: 100% !important;
        height: 100% !important;
        position: absolute;
        top: 0;
        left: 0;
      }

      #unityContainer {
        width: 100% !important;
        height: 100% !important;
      }

      /* Cache la barre de titre/logo */
      .footer {
        display: none;
      }
    </style>
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <script>
      var unityInstance = UnityLoader.instantiate("unityContainer", "Build/4-SOUL.json", {onProgress: UnityProgress});

      // Assure que le jeu se redimensionne si vous changez la taille de la fenêtre
      window.addEventListener('resize', function() {
        var container = document.getElementById("unityContainer");
        container.style.width = window.innerWidth + "px";
        container.style.height = window.innerHeight + "px";
      });
    </script>
  </head>
  <body>
    <div id="unityContainer"></div>
  </body>
</html>
