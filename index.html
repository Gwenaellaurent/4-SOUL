<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unity WebGL Player | Existential Achetypes</title>
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <style>
      /* On s'assure que le html et body prennent tout l'écran */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        height: 100dvh; /* Hauteur dynamique */
        overflow: hidden;
        background: black;
      }

      #unityContainer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw; /* Largeur totale */
        height: 100%;
        height: 100dvh; /* Hauteur dynamique */
      }
      
      /* Optionnel : S'assurer que le canvas à l'intérieur prend bien toute la place */
      canvas {
        width: 100% !important;
        height: 100% !important;
      }
    </style>
    <script>
    // 1. On neutralise la fonction d'alerte du navigateur
    // Unity utilise souvent 'window.alert' ou 'confirm' pour ce message
    var originalAlert = window.alert;
    window.alert = function(message) {
      if (message.indexOf("WebGL") !== -1 || message.indexOf("compatibility") !== -1) {
        console.log("Alerte Unity bloquée : " + message);
        return true; 
      }
      return originalAlert(message);
    };
  
    // 2. On force le système Unity à croire qu'il n'est pas sur mobile
    if (typeof UnityLoader !== "undefined" && UnityLoader.SystemInfo) {
      UnityLoader.SystemInfo.mobile = false;
    }
  
    // 3. Ton appel habituel
    var unityInstance = UnityLoader.instantiate("unityContainer", "Build/4-SOUL.json");
    </script>
  </head>

  <body>
    <div id="unityContainer"></div>
  </body>
</html>
