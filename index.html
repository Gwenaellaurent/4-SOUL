<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Existential Achetypes</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <script>
      var unityInstance = UnityLoader.instantiate("unityContainer", "Build/4-SOUL.json", {onProgress: UnityProgress});
    </script>

    <!-- AJOUT DU STYLE ICI -->
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
      }
      
      .webgl-content {
        width: 100%;
        height: 100%;
      }

      /* Force le canvas à prendre tout l'écran */
      #unityContainer {
        width: 100vw !important;
        height: 100vh !important;
      }

      /* Masque le footer Unity par défaut pour gagner de la place */
      .footer { display: none; }

      /* Rotation pour Mobile Portrait */
      @media screen and (orientation: portrait) and (max-width: 1024px) {
        #unityContainer {
          transform: rotate(90deg);
          transform-origin: bottom left;
          position: absolute;
          top: -100vw;
          left: 0;
          height: 100vw !important;
          width: 100vh !important;
        }
      }
    </style>
  </head>
  
  <body>
    <div class="webgl-content">
      <!-- Suppression du style fixe (960x600) ici -->
      <div id="unityContainer"></div>
    </div>

    <!-- Script pour activer le plein écran au premier clic -->
    <script>
      document.addEventListener("click", function() {
        if (unityInstance) {
          unityInstance.SetFullscreen(1);
        }
      }, { once: true });
    </script>
  </body>
</html>
